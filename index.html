<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicago Cinema</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080808;
  --surface: #111;
  --surface2: #181818;
  --border: #1f1f1f;
  --accent: #e8c87a;
  --text: #ede9e0;
  --muted: #666;
  --imax-c: #60a5fa;
  --dolby-c: #a78bfa;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  min-height: 100vh;
}

/* HEADER */
header {
  padding: 2rem 2.5rem 1.5rem;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(160deg, #141410 0%, #0a0a0a 60%);
}
.logo h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(2rem, 4vw, 3rem);
  line-height: 1;
  letter-spacing: -0.02em;
}
.logo h1 em { color: var(--accent); font-style: italic; }
.logo p { font-size: 0.72rem; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; margin-top: 0.35rem; }

#refresh-btn {
  padding: 0.5rem 1.1rem;
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  transition: all 0.15s;
}
#refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

/* CONTROLS */
#controls {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.date-tabs {
  display: flex;
  gap: 0.4rem;
  padding: 0.85rem 2.5rem;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
}
.date-tabs::-webkit-scrollbar { display: none; }
.date-tab {
  padding: 0.35rem 1rem;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: none;
  color: var(--muted);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  white-space: nowrap;
  transition: all 0.15s;
}
.date-tab:hover { color: var(--text); border-color: #444; }
.date-tab.active { background: var(--accent); border-color: var(--accent); color: #0a0a0a; font-weight: 500; }

.toolbar {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.75rem 2.5rem;
  flex-wrap: wrap;
}
.seg {
  display: flex;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.seg button {
  padding: 0.38rem 0.9rem;
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  transition: all 0.15s;
}
.seg button.active { background: var(--accent); color: #0a0a0a; font-weight: 500; }
.seg button + button { border-left: 1px solid var(--border); }

.pill {
  padding: 0.38rem 0.9rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: none;
  color: var(--muted);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  transition: all 0.15s;
}
.pill.active { border-color: var(--accent); color: var(--accent); background: rgba(232,200,122,0.07); }

.spacer { flex: 1; }
#search {
  padding: 0.38rem 0.9rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  width: 210px;
  outline: none;
  transition: border-color 0.15s;
}
#search:focus { border-color: var(--accent); }
#search::placeholder { color: var(--muted); }

/* MAIN */
main { padding: 1.5rem 2.5rem 5rem; max-width: 1440px; margin: 0 auto; }
.meta-bar { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.04em; padding: 0.5rem 0 1rem; text-transform: uppercase; }

/* THEATER BLOCK */
.theater-block { margin-bottom: 2.2rem; animation: up 0.25s ease both; }
@keyframes up { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

.theater-hd {
  display: flex;
  align-items: baseline;
  gap: 0.6rem;
  padding-bottom: 0.6rem;
  margin-bottom: 0.75rem;
  border-bottom: 1px solid var(--border);
}
.t-name { font-family: 'DM Serif Display', serif; font-size: 1.2rem; }
.t-meta { font-size: 0.75rem; color: var(--muted); }

.movie-row {
  display: flex;
  align-items: flex-start;
  gap: 1rem;
  padding: 0.7rem 0.85rem;
  border-radius: 8px;
  margin-bottom: 0.3rem;
  transition: background 0.12s;
}
.movie-row:hover { background: var(--surface); }
.m-title { font-size: 0.88rem; font-weight: 500; min-width: 190px; flex-shrink: 0; padding-top: 0.1rem; line-height: 1.3; }

.chips { display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center; }
.fmt {
  font-size: 0.6rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase;
  padding: 0.12rem 0.4rem; border-radius: 3px;
}
.fmt-IMAX  { background: rgba(96,165,250,0.15); color: var(--imax-c); border: 1px solid rgba(96,165,250,0.25); }
.fmt-Dolby { background: rgba(167,139,250,0.15); color: var(--dolby-c); border: 1px solid rgba(167,139,250,0.25); }
.fmt-Other { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

.time-chip {
  font-size: 0.8rem; padding: 0.22rem 0.55rem;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 5px;
  transition: all 0.1s;
}
.time-chip:hover { border-color: var(--accent); color: var(--accent); }

/* MOVIE BLOCK */
.movie-block { margin-bottom: 2.2rem; animation: up 0.25s ease both; }
.movie-hd { display: flex; align-items: baseline; gap: 0.6rem; padding-bottom: 0.6rem; margin-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
.movie-title-lg { font-family: 'DM Serif Display', serif; font-size: 1.3rem; font-style: italic; }
.movie-count { font-size: 0.75rem; color: var(--muted); }

.theater-line {
  display: flex; align-items: center; gap: 1rem;
  padding: 0.65rem 0.85rem; border-radius: 8px; margin-bottom: 0.3rem;
  transition: background 0.12s;
}
.theater-line:hover { background: var(--surface); }
.tl-name { font-size: 0.83rem; color: var(--muted); min-width: 200px; flex-shrink: 0; }

/* STATES */
.state-box { text-align: center; padding: 5rem 2rem; color: var(--muted); }
.state-box h2 { font-family: 'DM Serif Display', serif; font-size: 1.6rem; color: var(--text); margin-bottom: 0.4rem; }
.state-box p  { font-size: 0.85rem; line-height: 1.7; }
.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* FOOTER */
footer {
  position: fixed; bottom:0; left:0; right:0;
  padding: 0.5rem 2.5rem;
  background: var(--surface); border-top: 1px solid var(--border);
  display: flex; align-items: center; font-size: 0.72rem; color: var(--muted); gap: 1rem;
}
footer a { color: var(--accent); text-decoration: none; }

@media (max-width:700px) {
  header, .date-tabs, .toolbar, main { padding-left: 1rem; padding-right: 1rem; }
  .movie-row { flex-direction: column; gap: 0.5rem; }
  .m-title { min-width: unset; }
  .theater-line { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
  .tl-name { min-width: unset; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <h1>Chicago <em>Cinema</em></h1>
    <p>All showtimes · Powered by Google</p>
  </div>
  <button id="refresh-btn" onclick="reload()">↺ Refresh</button>
</header>

<div id="controls" style="display:none">
  <div class="date-tabs" id="dateTabs"></div>
  <div class="toolbar">
    <div class="seg">
      <button id="v-theater" class="active" onclick="setView('theater')">By Theater</button>
      <button id="v-movie" onclick="setView('movie')">By Movie</button>
    </div>
    <button class="pill active" id="f-all"   onclick="setFmt('all')">All</button>
    <button class="pill"        id="f-IMAX"  onclick="setFmt('IMAX')">IMAX</button>
    <button class="pill"        id="f-Dolby" onclick="setFmt('Dolby')">Dolby</button>
    <div class="spacer"></div>
    <input id="search" type="text" placeholder="Search movie or theater…" oninput="onSearch(this.value)" />
  </div>
</div>

<main id="main"></main>

<footer>
  <span id="ft">—</span>
  <div style="flex:1"></div>
  <span>Data via <a href="https://serpapi.com" target="_blank">SerpAPI</a></span>
</footer>

<script>
// API endpoint — when deployed on Vercel, calls /api/showtimes (same domain, no CORS issue)
const API = '/api/showtimes';

let S = { data: null, dayIdx: 0, view: 'theater', fmt: 'all', q: '' };

window.onload = load;

async function load() {
  showState('loading');
  try {
    const r = await fetch(API);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const json = await r.json();
    if (json.error) throw new Error(json.error);
    S.data = json;
    S.dayIdx = 0;
    renderAll();
  } catch(e) {
    showState('error', e.message);
  }
}

function reload() { S.data = null; load(); }

function renderAll() {
  const days = getDays();

  // Date tabs
  document.getElementById('dateTabs').innerHTML = days.map((d,i) => `
    <button class="date-tab ${i===S.dayIdx?'active':''}" onclick="setDay(${i})">${d.label}</button>
  `).join('');

  document.getElementById('controls').style.display = 'block';

  const theaters = applyFilters((days[S.dayIdx]?.raw?.theaters) || []);

  if (!theaters.length) {
    document.getElementById('main').innerHTML =
      `<div class="state-box"><h2>No results</h2><p>Try adjusting filters or refresh.</p></div>`;
    return;
  }

  const movieCount = new Set(theaters.flatMap(t => (t.showing||[]).map(s=>s.movie))).size;
  const meta = `<div class="meta-bar">${theaters.length} theaters &nbsp;·&nbsp; ${movieCount} movies</div>`;
  const body = S.view === 'theater'
    ? theaters.map(renderTheater).join('')
    : renderByMovie(theaters);

  document.getElementById('main').innerHTML = meta + body;
  document.getElementById('ft').textContent =
    `Updated ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
}

// ── THEATER VIEW ──────────────────────────────────────────
function renderTheater(t) {
  const rows = (t.showing||[]).map(s => {
    const fk = fmtKey(s.type||'');
    return `<div class="movie-row">
      <div class="m-title">${esc(s.movie||'—')}</div>
      <div class="chips">
        <span class="fmt fmt-${fk}">${esc(s.type||'Standard')}</span>
        ${(s.time||[]).map(x=>`<span class="time-chip">${esc(x)}</span>`).join('')}
      </div>
    </div>`;
  }).join('');

  return `<div class="theater-block">
    <div class="theater-hd">
      <span class="t-name">${esc(t.name)}</span>
      ${t.distance?`<span class="t-meta">${esc(t.distance)}</span>`:''}
      ${t.address?`<span class="t-meta">· ${esc(t.address)}</span>`:''}
    </div>
    ${rows}
  </div>`;
}

// ── MOVIE VIEW ────────────────────────────────────────────
function renderByMovie(theaters) {
  const map = {};
  theaters.forEach(t => {
    (t.showing||[]).forEach(s => {
      const title = s.movie || 'Unknown';
      (map[title] = map[title]||[]).push({t, s});
    });
  });
  return Object.entries(map).sort(([a],[b])=>a.localeCompare(b)).map(([title, entries]) => {
    const lines = entries.map(({t,s}) => {
      const fk = fmtKey(s.type||'');
      return `<div class="theater-line">
        <div class="tl-name">${esc(t.name)}</div>
        <div class="chips">
          <span class="fmt fmt-${fk}">${esc(s.type||'Standard')}</span>
          ${(s.time||[]).map(x=>`<span class="time-chip">${esc(x)}</span>`).join('')}
        </div>
      </div>`;
    }).join('');
    return `<div class="movie-block">
      <div class="movie-hd">
        <span class="movie-title-lg">${esc(title)}</span>
        <span class="movie-count">${entries.length} theater${entries.length>1?'s':''}</span>
      </div>
      ${lines}
    </div>`;
  }).join('');
}

// ── HELPERS ───────────────────────────────────────────────
function getDays() {
  return (S.data?.showtimes||[]).map((d,i) => ({
    label: d.day==='Today'?'Today':d.day==='Tomorrow'?'Tomorrow':(d.date||d.day),
    raw: d, i
  }));
}

function applyFilters(theaters) {
  return theaters.map(t => {
    let sh = (t.showing||[]);
    if (S.fmt !== 'all') sh = sh.filter(s=>(s.type||'').toLowerCase().includes(S.fmt.toLowerCase()));
    if (S.q) {
      const q = S.q.toLowerCase();
      if (!t.name.toLowerCase().includes(q))
        sh = sh.filter(s=>(s.movie||'').toLowerCase().includes(q));
    }
    return {...t, showing: sh};
  }).filter(t => t.showing.length > 0);
}

function fmtKey(type) {
  if (type.toUpperCase().includes('IMAX')) return 'IMAX';
  if (type.toLowerCase().includes('dolby')) return 'Dolby';
  return 'Other';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showState(type, msg='') {
  document.getElementById('controls').style.display = 'none';
  const m = document.getElementById('main');
  if (type === 'loading') {
    m.innerHTML = `<div class="state-box"><div class="spinner"></div><p>Loading Chicago showtimes…</p></div>`;
  } else if (type === 'error') {
    m.innerHTML = `<div class="state-box">
      <h2>⚠ Could not load</h2>
      <p style="color:#f87171">${esc(msg)}</p>
    </div>`;
  }
}

function setDay(i) { S.dayIdx = i; renderAll(); }
function setView(v) {
  S.view = v;
  document.querySelectorAll('.seg button').forEach(b=>b.classList.remove('active'));
  document.getElementById(`v-${v}`).classList.add('active');
  renderAll();
}
function setFmt(f) {
  S.fmt = f;
  ['all','IMAX','Dolby'].forEach(x=>document.getElementById(`f-${x}`).classList.toggle('active',x===f));
  renderAll();
}
function onSearch(v) { S.q = v; renderAll(); }
</script>
</body>
</html>
